<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alphy Assets</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #0f172a;      
            --card-bg: #1e293b;       
            --text-color: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #3b82f6;        
            --accent-hover: #2563eb;
            --success: #10b981;
            --border-color: #334155;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 40px 20px;
            scrollbar-width: thin;
            scrollbar-color: var(--border-color) var(--bg-color);
        }

        body::-webkit-scrollbar { width: 8px; }
        body::-webkit-scrollbar-track { background: var(--bg-color); }
        body::-webkit-scrollbar-thumb { background-color: var(--border-color); border-radius: 4px; }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        header h1 {
            font-weight: 700;
            font-size: 2.5rem;
            margin-bottom: 20px;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .search-container {
            position: relative;
            max-width: 600px;
            margin: 0 auto;
        }

        #searchBar {
            width: 100%;
            box-sizing: border-box;
            padding: 14px 24px;
            font-size: 16px;
            border-radius: 9999px;
            border: 2px solid var(--border-color);
            background-color: var(--card-bg);
            color: var(--text-color);
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        #searchBar:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.2);
        }

        .tabs {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 20px;
        }

        .tab-btn {
            background-color: transparent;
            color: var(--text-muted);
            border: 1px solid var(--border-color);
            padding: 8px 20px;
            border-radius: 9999px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            text-transform: capitalize;
            transition: all 0.2s ease;
        }

        .tab-btn:hover {
            color: var(--text-color);
            border-color: var(--text-muted);
        }

        .tab-btn.active {
            background-color: var(--accent);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
        }
        
        .item-count {
            text-align: center;
            color: var(--text-muted);
            font-size: 14px;
            margin-bottom: 30px;
            font-weight: 500;
            letter-spacing: 0.5px;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 24px;
            max-width: 1200px;
            margin: 0 auto;
        }

        @media (max-width: 1024px) { .grid { grid-template-columns: repeat(3, 1fr); } }
        @media (max-width: 768px) { .grid { grid-template-columns: repeat(2, 1fr); } }
        @media (max-width: 480px) { .grid { grid-template-columns: 1fr; } }

        .card {
            background-color: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            text-align: center;
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border-color: var(--accent);
        }

        .image-container {
            width: 100%;
            height: 160px;
            background-color: rgba(0,0,0,0.2);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 20px;
            padding: 10px;
            box-sizing: border-box;
        }

        .card img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.3));
        }

        .card-info { width: 100%; }

        .item-name {
            font-size: 13px;
            color: var(--text-muted);
            margin-bottom: 16px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .name-badge {
            background-color: #0f172a;
            border: 1px solid var(--border-color);
            padding: 6px 12px;
            border-radius: 6px;
            font-weight: 600;
            color: var(--text-color);
            font-size: 14px;
            word-break: break-all;
            width: 100%;
            box-sizing: border-box;
        }

        .copy-btn {
            background-color: var(--border-color);
            color: var(--text-color);
            border: none;
            padding: 10px 15px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            width: 100%;
            transition: all 0.2s ease;
        }

        .copy-btn:hover {
            background-color: var(--text-muted);
            color: #000;
        }

        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin-top: 40px;
            flex-wrap: wrap;
        }

        .page-btn {
            background-color: var(--card-bg);
            color: var(--text-color);
            border: 1px solid var(--border-color);
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.2s ease;
        }

        .page-btn:hover:not(:disabled) {
            border-color: var(--accent);
            background-color: var(--border-color);
        }

        .page-btn.active {
            background-color: var(--accent);
            border-color: var(--accent);
            color: white;
        }

        .page-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        #loading {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin-top: 60px;
            color: var(--text-muted);
            font-size: 16px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 4px solid var(--border-color);
            border-top: 4px solid var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-bottom: 16px;
        }

        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <header>
        <h1>Alphy Asset Library</h1>
        <div class="search-container">
            <input type="text" id="searchBar" placeholder="Search across all items...">
        </div>
    </header>

    <div class="tabs" id="tabsContainer"></div>
    
    <div class="item-count" id="itemCount"></div>

    <div id="loading">
        <div class="spinner"></div>
        <span>Syncing repositories...</span>
    </div>

    <div class="grid" id="itemsGrid"></div>
    
    <div class="pagination" id="paginationContainer"></div>

    <script>
        const owner = 'AC-Storm-YT';
        const repo = 'alphy.github.io';

        let allItems = [];
        let filteredItems = []; 
        let currentCategory = 'all';
        
        let currentPage = 1;
        const itemsPerPage = 100;

        const tabsContainer = document.getElementById('tabsContainer');
        const itemsGrid = document.getElementById('itemsGrid');
        const paginationContainer = document.getElementById('paginationContainer');
        const searchBar = document.getElementById('searchBar');
        const loadingStatus = document.getElementById('loading');
        const itemCount = document.getElementById('itemCount');

        async function fetchGitHubData() {
            try {
                // 1. We use the Git Trees API to fetch the entire repo structure in ONE call
                let branch = 'main';
                let treeUrl = `https://api.github.com/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`;
                let response = await fetch(treeUrl);
                
                // Fallback to 'master' branch if 'main' isn't found
                if (!response.ok) {
                    branch = 'master';
                    treeUrl = `https://api.github.com/repos/${owner}/${repo}/git/trees/${branch}?recursive=1`;
                    response = await fetch(treeUrl);
                }

                if (!response.ok) throw new Error('Failed to fetch repository tree. API Rate limit might be reached temporarily.');
                
                const data = await response.json();

                // 2. Loop through every file in the entire repository
                data.tree.forEach(file => {
                    // Check if the file is inside 'icons/', is a .png, and ignores the 'error' folder
                    if (file.path.startsWith('icons/') && file.path.endsWith('.png') && !file.path.includes('/error/')) {
                        // Example file.path: "icons/Body/Octane.png"
                        const parts = file.path.split('/'); 
                        const category = parts[1]; // e.g. "Body"
                        const fileName = parts[parts.length - 1]; // e.g. "Octane.png"
                        const itemName = fileName.replace('.png', '');
                        
                        // We construct the direct raw download URL safely
                        const imageUrl = `https://raw.githubusercontent.com/${owner}/${repo}/${branch}/${file.path}`;

                        allItems.push({
                            category: category,
                            fileName: fileName,
                            itemName: itemName,
                            imageUrl: imageUrl
                        });
                    }
                });

                loadingStatus.style.display = 'none';
                createTabs();
                applyFilters();

            } catch (error) {
                loadingStatus.innerHTML = `<span style="color: #ef4444;">Error: ${error.message}</span>`;
                console.error(error);
            }
        }

        function createTabs() {
            const categories = ['all', ...new Set(allItems.map(item => item.category))];

            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = `tab-btn ${cat === 'all' ? 'active' : ''}`;
                btn.innerText = cat;
                btn.onclick = () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentCategory = cat;
                    applyFilters(); 
                };
                tabsContainer.appendChild(btn);
            });
        }

        function applyFilters() {
            const searchQuery = searchBar.value.toLowerCase();
            
            filteredItems = allItems.filter(item => {
                const matchesCategory = currentCategory === 'all' || item.category === currentCategory;
                const matchesSearch = item.itemName.toLowerCase().includes(searchQuery);
                return matchesCategory && matchesSearch;
            });

            if (filteredItems.length === allItems.length) {
                itemCount.innerText = `Showing all ${allItems.length} items`;
            } else {
                itemCount.innerText = `Showing ${filteredItems.length} of ${allItems.length} total items`;
            }

            currentPage = 1; 
            renderPage();
        }

        function renderPage() {
            itemsGrid.innerHTML = '';

            const startIndex = (currentPage - 1) * itemsPerPage;
            const endIndex = startIndex + itemsPerPage;
            
            const itemsToShow = filteredItems.slice(startIndex, endIndex);

            itemsToShow.forEach(item => {
                const card = document.createElement('div');
                card.className = 'card';

                card.innerHTML = `
                    <div class="image-container">
                        <img src="${item.imageUrl}" alt="${item.itemName}" loading="lazy">
                    </div>
                    <div class="card-info">
                        <div class="item-name">
                            <span>ID / Name</span>
                            <span class="name-badge">${item.itemName}</span>
                        </div>
                        <button class="copy-btn">Copy</button>
                    </div>
                `;

                const copyBtn = card.querySelector('.copy-btn');
                copyBtn.addEventListener('click', function() {
                    copyToClipboard(item.itemName, this);
                });

                itemsGrid.appendChild(card);
            });

            if (filteredItems.length === 0) {
                itemsGrid.innerHTML = '<p style="grid-column: 1 / -1; text-align: center; color: var(--text-muted);">No items found matching your criteria.</p>';
            }

            renderPagination();
        }

        function renderPagination() {
            paginationContainer.innerHTML = '';
            
            const totalPages = Math.ceil(filteredItems.length / itemsPerPage);
            if (totalPages <= 1) return; 

            const prevBtn = document.createElement('button');
            prevBtn.className = 'page-btn';
            prevBtn.innerText = 'Prev';
            prevBtn.disabled = currentPage === 1;
            prevBtn.onclick = () => {
                if (currentPage > 1) {
                    currentPage--;
                    renderPage();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };
            paginationContainer.appendChild(prevBtn);

            let startPage = Math.max(1, currentPage - 2);
            let endPage = Math.min(totalPages, currentPage + 2);

            if (currentPage <= 2) endPage = Math.min(totalPages, 5);
            if (currentPage >= totalPages - 1) startPage = Math.max(1, totalPages - 4);

            for (let i = startPage; i <= endPage; i++) {
                const pageBtn = document.createElement('button');
                pageBtn.className = `page-btn ${i === currentPage ? 'active' : ''}`;
                pageBtn.innerText = i;
                pageBtn.onclick = () => {
                    currentPage = i;
                    renderPage();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };
                paginationContainer.appendChild(pageBtn);
            }

            const nextBtn = document.createElement('button');
            nextBtn.className = 'page-btn';
            nextBtn.innerText = 'Next';
            nextBtn.disabled = currentPage === totalPages;
            nextBtn.onclick = () => {
                if (currentPage < totalPages) {
                    currentPage++;
                    renderPage();
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                }
            };
            paginationContainer.appendChild(nextBtn);
        }

        function copyToClipboard(text, buttonElement) {
            navigator.clipboard.writeText(text).then(() => {
                const originalText = buttonElement.innerText;
                buttonElement.innerText = 'Copied!';
                buttonElement.style.backgroundColor = 'var(--success)';
                buttonElement.style.color = '#fff';
                
                setTimeout(() => {
                    buttonElement.innerText = originalText;
                    buttonElement.style.backgroundColor = '';
                    buttonElement.style.color = '';
                }, 1500);
            });
        }

        searchBar.addEventListener('input', applyFilters);
        fetchGitHubData();
    </script>
</body>
</html>
